<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Living Wiki</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-deep: #0c0e12;
      --bg: #121518;
      --bg-surface: #1a1d22;
      --bg-elevated: #22262d;
      --bg-input: #15181d;
      --text: #d4cfc4;
      --text-bright: #ede8dc;
      --text-muted: #7d7868;
      --text-dim: #8a8275;
      --accent-warm: #c49a5c;
      --accent-warm-glow: rgba(196, 154, 92, 0.12);
      --accent-warm-subtle: rgba(196, 154, 92, 0.06);
      --accent-green: #7ab07a;
      --accent-green-bg: rgba(122, 176, 122, 0.1);
      --accent-blue: #7a9ec4;
      --accent-blue-bg: rgba(122, 158, 196, 0.1);
      --border: rgba(255, 248, 230, 0.06);
      --border-focus: rgba(196, 154, 92, 0.4);
      --error: #c47a6a;
      --radius: 8px;
      --font-display: 'Instrument Serif', Georgia, serif;
      --font-body: 'DM Sans', system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', 'SF Mono', monospace;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Subtle grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      opacity: 0.025;
      pointer-events: none;
      z-index: 100;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }

    /* Warm gradient vignette */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 99;
      background: radial-gradient(ellipse at 50% 0%, rgba(196, 154, 92, 0.03) 0%, transparent 60%),
                  radial-gradient(ellipse at 50% 100%, rgba(12, 14, 18, 0.5) 0%, transparent 60%);
    }

    /* ── Header ── */
    header {
      padding: 28px 40px 0;
      flex-shrink: 0;
      display: flex;
      align-items: baseline;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: baseline;
      gap: 2px;
    }

    .logo-living {
      font-family: var(--font-display);
      font-size: 26px;
      color: var(--accent-warm);
      font-style: italic;
      line-height: 1;
    }

    .logo-wiki {
      font-family: var(--font-body);
      font-size: 15px;
      font-weight: 500;
      color: var(--text-muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-left: 6px;
    }

    .header-rule {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, var(--border), transparent 80%);
      margin-top: 6px;
    }

    /* ── Main ── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 24px 40px;
      gap: 20px;
      min-height: 0;
    }

    /* ── Input Section ── */
    .input-section {
      flex-shrink: 0;
      animation: fadeInUp 0.5s ease both;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .input-wrapper {
      position: relative;
    }

    textarea {
      width: 100%;
      min-height: 120px;
      max-height: 280px;
      padding: 20px 24px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-bright);
      font-family: var(--font-body);
      font-size: 15px;
      font-weight: 300;
      line-height: 1.7;
      resize: none;
      outline: none;
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }

    textarea:focus {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 1px var(--border-focus),
                  0 8px 32px -8px rgba(0,0,0,0.3);
    }

    textarea::placeholder {
      color: var(--text-dim);
      font-style: italic;
      font-family: var(--font-display);
      font-size: 17px;
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 14px;
      align-items: center;
    }

    .action-btn {
      position: relative;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 24px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg-surface);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.25s ease;
      overflow: hidden;
    }

    .action-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.25s ease;
    }

    .action-btn.capture-btn::before {
      background: linear-gradient(135deg, var(--accent-green-bg), transparent);
    }

    .action-btn.ask-btn::before {
      background: linear-gradient(135deg, var(--accent-blue-bg), transparent);
    }

    .action-btn:hover {
      border-color: rgba(255, 248, 230, 0.12);
      transform: translateY(-1px);
    }

    .action-btn:hover::before {
      opacity: 1;
    }

    .action-btn:active {
      transform: translateY(0) scale(0.99);
    }

    .action-btn.active {
      border-color: var(--accent-warm);
    }

    .action-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none !important;
    }

    .btn-icon {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      opacity: 0.6;
    }

    .capture-btn .btn-icon { color: var(--accent-green); opacity: 0.8; }
    .ask-btn .btn-icon { color: var(--accent-blue); opacity: 0.8; }

    .btn-label {
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    .btn-hint {
      color: var(--text-dim);
      font-size: 12px;
      font-weight: 400;
      padding-left: 8px;
      border-left: 1px solid var(--border);
    }

    .shortcut-hint {
      color: var(--text-dim);
      font-family: var(--font-mono);
      font-size: 11px;
      margin-left: auto;
      white-space: nowrap;
      letter-spacing: -0.01em;
    }

    /* ── Response Section ── */
    .response-section {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      animation: fadeInUp 0.5s ease 0.1s both;
    }

    .response-label {
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-dim);
      margin-bottom: 8px;
      padding-left: 2px;
    }

    .response-container {
      flex: 1;
      overflow-y: auto;
      background: var(--bg-deep);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0;
    }

    .response-container:empty::after {
      content: '';
      display: block;
      height: 100%;
      min-height: 200px;
    }

    .response-container:empty::before {
      content: 'Your responses will appear here.';
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      min-height: 200px;
      color: var(--text-dim);
      font-style: italic;
      font-family: var(--font-display);
      font-size: 16px;
    }

    .response-entry {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      animation: entryAppear 0.3s ease both;
    }

    @keyframes entryAppear {
      from { opacity: 0; transform: translateY(-4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .response-entry:last-child {
      border-bottom: none;
    }

    .entry-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .action-tag {
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 3px 8px;
      border-radius: 4px;
    }

    .action-tag.capture {
      background: var(--accent-green-bg);
      color: var(--accent-green);
    }

    .action-tag.ask {
      background: var(--accent-blue-bg);
      color: var(--accent-blue);
    }

    .entry-query {
      color: var(--text-muted);
      font-size: 12px;
      font-style: italic;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .entry-content {
      font-size: 14px;
      line-height: 1.75;
      color: var(--text);
      white-space: pre-wrap;
      word-wrap: break-word;
      font-weight: 300;
    }

    .entry-content a {
      color: var(--accent-warm);
      text-decoration: none;
      border-bottom: 1px solid rgba(196, 154, 92, 0.3);
      transition: border-color 0.2s;
    }

    .entry-content a:hover {
      border-color: var(--accent-warm);
    }

    .loading-indicator {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      color: var(--text-muted);
      font-size: 13px;
      font-style: italic;
      font-family: var(--font-display);
    }

    .loading-indicator .dot {
      width: 4px;
      height: 4px;
      background: var(--accent-warm);
      border-radius: 50%;
      animation: breathe 1.8s ease-in-out infinite;
    }

    .loading-indicator .dot:nth-child(2) { animation-delay: 0.3s; }
    .loading-indicator .dot:nth-child(3) { animation-delay: 0.6s; }

    @keyframes breathe {
      0%, 100% { opacity: 0.2; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1.2); }
    }

    .error-text {
      color: var(--error);
      font-family: var(--font-mono);
      font-size: 13px;
    }

    /* ── Footer ── */
    footer {
      padding: 12px 40px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-dim);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      animation: fadeInUp 0.5s ease 0.2s both;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text-dim);
      flex-shrink: 0;
      transition: background 0.3s, box-shadow 0.3s;
    }

    .status-dot.connected {
      background: var(--accent-green);
      box-shadow: 0 0 6px rgba(122, 176, 122, 0.4);
    }

    .status-dot.error {
      background: var(--error);
      box-shadow: 0 0 6px rgba(196, 122, 106, 0.4);
    }

    .vault-path {
      color: var(--text-dim);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 300px;
    }

    .footer-sep {
      color: var(--border);
    }

    .note-count {
      color: var(--text-muted);
    }

    .footer-right {
      margin-left: auto;
      color: var(--text-dim);
    }

    .footer-right a {
      color: var(--text-dim);
      text-decoration: none;
      transition: color 0.2s;
    }

    .footer-right a:hover {
      color: var(--text-muted);
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,248,230,0.08); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,248,230,0.15); }

    /* ── Drag and drop ── */
    .input-wrapper.dragover textarea {
      border-color: var(--accent-warm);
      border-style: dashed;
      box-shadow: 0 0 0 1px var(--accent-warm),
                  inset 0 0 40px var(--accent-warm-subtle);
    }

    /* ── Focus ring for accessibility ── */
    .action-btn:focus-visible {
      outline: 2px solid var(--accent-warm);
      outline-offset: 2px;
    }

    /* ── Responsive ── */
    @media (max-width: 640px) {
      header { padding: 20px 20px 0; }
      main { padding: 16px 20px; }
      footer { padding: 10px 20px; }
      .btn-hint { display: none; }
      .shortcut-hint { display: none; }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">
      <span class="logo-living">Living</span>
      <span class="logo-wiki">Wiki</span>
    </div>
    <div class="header-rule"></div>
  </header>

  <main>
    <div class="input-section">
      <div class="input-wrapper" id="inputWrapper">
        <textarea
          id="input"
          placeholder="What's on your mind?"
          autofocus
          spellcheck="false"
        ></textarea>
      </div>
      <div class="actions">
        <button class="action-btn capture-btn" id="captureBtn" onclick="submit('capture')">
          <svg class="btn-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M8 1v14M1 8h14"/>
          </svg>
          <span class="btn-label">Capture</span>
          <span class="btn-hint">File my thoughts</span>
        </button>
        <button class="action-btn ask-btn" id="askBtn" onclick="submit('ask')">
          <svg class="btn-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="7" cy="7" r="5"/>
            <path d="M15 15l-3.5-3.5"/>
          </svg>
          <span class="btn-label">Ask</span>
          <span class="btn-hint">Search my wiki</span>
        </button>
        <!-- keyboard shortcuts work but hidden from UI to reduce clutter -->
      </div>
    </div>

    <div class="response-section">
      <div class="response-label">Responses</div>
      <div class="response-container" id="responses"></div>
    </div>
  </main>

  <footer>
    <div class="status-dot" id="statusDot"></div>
    <span class="vault-path" id="vaultPath">Connecting...</span>
    <span class="footer-sep">/</span>
    <span class="note-count" id="noteCount"></span>
    <span class="footer-right">
      <a href="https://github.com/bronsonelliott/living-wiki" target="_blank" rel="noopener">github.com/bronsonelliott/living-wiki</a>
    </span>
  </footer>

  <script>
    const input = document.getElementById('input');
    const responses = document.getElementById('responses');
    const captureBtn = document.getElementById('captureBtn');
    const askBtn = document.getElementById('askBtn');
    const statusDot = document.getElementById('statusDot');
    const vaultPathEl = document.getElementById('vaultPath');
    const noteCountEl = document.getElementById('noteCount');
    const shortcutHint = document.getElementById('shortcutHint');
    const inputWrapper = document.getElementById('inputWrapper');

    let lastAction = 'capture';
    let isProcessing = false;

    const isMac = navigator.platform.includes('Mac');
    const modKey = isMac ? '\u2318' : 'Ctrl';

    function updateShortcutHint() {
      shortcutHint.textContent = `${modKey}+1 capture \u2022 ${modKey}+2 ask \u2022 ${modKey}+\u21B5 submit`;
    }
    updateShortcutHint();

    async function checkStatus() {
      try {
        const res = await fetch('/api/status');
        const data = await res.json();
        if (data.ok) {
          statusDot.className = 'status-dot connected';
          const vp = data.vaultPath.replace(/^\/Users\/[^/]+\//, '~/');
          vaultPathEl.textContent = vp;
          noteCountEl.textContent = `${data.noteCount} notes`;
        }
      } catch {
        statusDot.className = 'status-dot error';
        vaultPathEl.textContent = 'disconnected';
        noteCountEl.textContent = '';
      }
    }
    checkStatus();
    setInterval(checkStatus, 30000);

    async function submit(action) {
      const text = input.value.trim();
      if (!text || isProcessing) return;

      lastAction = action;
      isProcessing = true;
      updateShortcutHint();

      captureBtn.disabled = true;
      askBtn.disabled = true;
      captureBtn.classList.toggle('active', action === 'capture');
      askBtn.classList.toggle('active', action === 'ask');

      const entry = document.createElement('div');
      entry.className = 'response-entry';

      const header = document.createElement('div');
      header.className = 'entry-header';

      const tag = document.createElement('span');
      tag.className = `action-tag ${action}`;
      tag.textContent = action;
      header.appendChild(tag);

      const query = document.createElement('span');
      query.className = 'entry-query';
      query.textContent = text.length > 100 ? text.substring(0, 100) + '\u2026' : text;
      header.appendChild(query);

      entry.appendChild(header);

      const content = document.createElement('div');
      content.className = 'entry-content';
      content.innerHTML = '<div class="loading-indicator"><div class="dot"></div><div class="dot"></div><div class="dot"></div><span>thinking\u2026</span></div>';
      entry.appendChild(content);

      responses.insertBefore(entry, responses.firstChild);
      input.value = '';
      input.style.height = 'auto';
      input.focus();

      try {
        const endpoint = action === 'capture' ? '/api/capture' : '/api/ask';
        const res = await fetch(endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text })
        });

        if (!res.ok) {
          const err = await res.json();
          content.innerHTML = `<span class="error-text">\u2717 ${err.error || 'Unknown error'}</span>`;
          return;
        }

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let responseText = '';
        let firstChunk = true;
        let buffer = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop();

          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            try {
              const event = JSON.parse(line.substring(6));
              if (event.type === 'text' || event.type === 'delta') {
                if (firstChunk) {
                  content.innerHTML = '';
                  firstChunk = false;
                }
                responseText += event.content;
                content.textContent = responseText;
              } else if (event.type === 'error') {
                content.innerHTML = `<span class="error-text">\u2717 ${event.message}</span>`;
              }
            } catch {}
          }
        }

        if (firstChunk) {
          content.innerHTML = '<span class="error-text">\u2717 No response received</span>';
        }

        if (action === 'capture') setTimeout(checkStatus, 2000);

      } catch (err) {
        content.innerHTML = `<span class="error-text">\u2717 ${err.message}</span>`;
      } finally {
        isProcessing = false;
        captureBtn.disabled = false;
        askBtn.disabled = false;
        captureBtn.classList.remove('active');
        askBtn.classList.remove('active');
      }
    }

    document.addEventListener('keydown', (e) => {
      const mod = isMac ? e.metaKey : e.ctrlKey;
      if (mod && e.key === 'Enter') { e.preventDefault(); submit(lastAction); }
      else if (mod && e.key === '1') { e.preventDefault(); submit('capture'); }
      else if (mod && e.key === '2') { e.preventDefault(); submit('ask'); }
    });

    inputWrapper.addEventListener('dragover', (e) => {
      e.preventDefault();
      inputWrapper.classList.add('dragover');
    });

    inputWrapper.addEventListener('dragleave', () => {
      inputWrapper.classList.remove('dragover');
    });

    inputWrapper.addEventListener('drop', (e) => {
      e.preventDefault();
      inputWrapper.classList.remove('dragover');
      const url = e.dataTransfer.getData('text/uri-list') || e.dataTransfer.getData('text/plain');
      if (url && url.startsWith('http')) {
        input.value = url;
        lastAction = 'capture';
        updateShortcutHint();
        input.focus();
        return;
      }
      if (e.dataTransfer.files.length > 0) {
        const file = e.dataTransfer.files[0];
        const reader = new FileReader();
        reader.onload = (ev) => {
          input.value = ev.target.result;
          lastAction = 'capture';
          updateShortcutHint();
          input.focus();
        };
        reader.readAsText(file);
      }
    });

    input.addEventListener('input', () => {
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 280) + 'px';
    });
  </script>

</body>
</html>
